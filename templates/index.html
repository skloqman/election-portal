<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP's Election Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root { --bg: #FAFAFA; --card-bg: #FFFFFF; --border: #E2E8F0; --primary: #931111; }
  body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px 20px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-family: 'Space Grotesk'; font-size: 32px; background: linear-gradient(90deg, #931111, #000000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 30px; }
  .grid-btn { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .btn { padding: 12px; background: #fff; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 600; }
  .btn.active { background: var(--primary); color: #fff; }
  .card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
  .list-item { padding: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
let state = { view: "vote", roster: [], selectedGrade: null, config: null };

async function initSync() {
  const res = await fetch('/api/get-initial-state');
  const data = await res.json();
  state.roster = data.roster;
  state.config = data.customConfig || { schoolName: "VIP's INTERNATIONAL SCHOOL" };
  render();
}

function render() {
  const grades = Array.from(new Set(state.roster.map(s => s.grade))).sort();
  let html = `<h1>${state.config.schoolName}</h1>
  <div class="grid-btn">
    ${grades.map(g => `<button class="btn ${state.selectedGrade==g?'active':''}" onclick="state.selectedGrade='${g}';render()">${g}</button>`).join('')}
  </div>`;
  
  if(state.selectedGrade) {
    const people = state.roster.filter(p => p.grade === state.selectedGrade);
    html += `<div class="card"><h3>${state.selectedGrade == "Faculty & Staff" ? "Staff Directory" : "Student Details - Grade " + state.selectedGrade}</h3>
    ${people.map(p => `<div class="list-item"><span>${p.name}</span><small>${p.section || p.house}</small></div>`).join('')}
    </div>`;
  }
  document.getElementById('app').innerHTML = html;
}
initSync();
</script>
</body>
</html>
